<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Applicants - JobLink</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

    <header class="bg-white shadow-md py-4 px-6 md:px-10 sticky top-0 z-50">
        <nav class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-indigo-700 rounded-md p-2 hover:bg-indigo-50 transition duration-300">JobLink</a>
            <div class="hidden md:flex space-x-6 items-center">
                <a id="gotorecruiterdash" class="text-gray-700 hover:text-indigo-600 font-medium transition duration-300">Dashboard</a>
               
                <a href="#" class="text-indigo-600 font-medium">Applicants</a>
                <button id="logout-button" class="px-5 py-2 bg-red-600 text-white font-semibold rounded-lg shadow-md hover:bg-red-700 transition duration-300 transform hover:scale-105">Logout</button>
            </div>
            <button id="mobile-menu-button" class="md:hidden text-gray-700 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </nav>
        <div id="mobile-menu" class="hidden md:hidden fixed inset-0 bg-white bg-opacity-95 z-40 flex flex-col items-center justify-center space-y-8 text-xl">
            <button id="close-mobile-menu" class="absolute top-6 right-6 text-gray-700 focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            <a href="/recruiter-dashboard.html" class="text-gray-700 hover:text-indigo-600 font-medium" onclick="document.getElementById('mobile-menu').classList.add('hidden')">Dashboard</a>
            <a href="#" class="text-indigo-600 font-medium transition duration-300" onclick="document.getElementById('mobile-menu').classList.add('hidden')">Applicants</a>
            <button id="logout-button-mobile" class="px-6 py-3 bg-red-600 text-white font-semibold rounded-lg shadow-md hover:bg-red-700 transition duration-300 transform hover:scale-105 w-4/5 text-center">Logout</button>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 md:p-6">
        <h1 class="text-4xl font-extrabold text-gray-800 mb-8 text-center">Manage Applicants</h1>

        <section class="bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold text-gray-700 mb-4">Applicants List</h2>
            <div id="applicants-container" class="grid grid-cols-1 gap-6">
                <div class="text-center text-gray-500 py-10" id="loading-applicants">Loading applicants...</div>
                <div class="text-center text-gray-500 py-10 hidden" id="no-applicants-message">No applicants found for this job.</div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 text-gray-300 py-8 px-6 md:px-10 mt-auto">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center text-center md:text-left">
            <div class="mb-4 md:mb-0">
                <h3 class="text-xl font-bold text-white mb-2">JobLink</h3>
                <p>&copy; 2025 All rights reserved.</p>
            </div>
            <div class="flex space-x-6">
                <a href="#" class="hover:text-white transition duration-300">Privacy Policy</a>
                <a href="#" class="hover:text-white transition duration-300">Terms of Service</a>
                <a href="#" class="hover:text-white transition duration-300">Contact Us</a>
            </div>
        </div>
    </footer>

    <script src="./ApplicantsofRecruiter.js"></script>
</body>
</html>
