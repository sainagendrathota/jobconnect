<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - JobLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-indigo-700 mb-8">Apply for <span id="job-title-display" class="text-purple-600"></span></h2>
        <div id="message-box" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
            <span class="block sm:inline" id="message-text"></span>
            <span class="absolute top-0 bottom-0 right-0 px-4 py-3 cursor-pointer" onclick="document.getElementById('message-box').classList.add('hidden')">
            </span>
        </div>

        <form id="apply-form" class="space-y-4">
            <input type="hidden" id="apply-job-id" name="jobId">
            <input type="hidden" id="apply-job-title" name="jobTitle">

            <div>
                <label for="resume-url" class="block text-sm font-medium text-gray-700 mb-1">Resume URL (e.g., Google Drive, Dropbox link)</label>
                <input type="url" id="resume-url" name="resumeUrl" placeholder="https://your-resume-link.com"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm focus:outline-none">
            </div>
            <div>
                <label for="cover-letter-snippet" class="block text-sm font-medium text-gray-700 mb-1">Cover Letter Snippet (Optional)</label>
                <textarea id="cover-letter-snippet" name="coverLetterSnippet" rows="4"
                          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm focus:outline-none"
                          placeholder="Tell us why you're a great fit for this role..."></textarea>
            </div>
            <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-lg font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-300 transform hover:scale-105">
                Submit Application
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            <a href="/jobseeker-dashboard.html" class="font-medium text-indigo-600 hover:text-indigo-500 transition duration-300">Back to Job Listings</a>
        </p>
    </div>
    <script src="./applynow.js"></script>
</body>
</html>
