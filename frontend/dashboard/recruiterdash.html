<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Dashboard - JobLink</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

  
    <header class="bg-white shadow-md py-4 px-6 md:px-10 sticky top-0 z-50">
        <nav class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-indigo-700 rounded-md p-2 hover:bg-indigo-50 transition duration-300">JobLink</a>
            <div class="hidden md:flex space-x-6 items-center">
                <a href="#" class="text-indigo-600 font-medium">Dashboard</a>
                <a href="#postedjobs" class="text-gray-700 hover:text-indigo-600 font-medium transition duration-300">Posted Jobs</a>
                
                <button id="logout-button" class="px-5 py-2 bg-red-600 text-white font-semibold rounded-lg shadow-md hover:bg-red-700 transition duration-300 transform hover:scale-105">Logout</button>
            </div>
            
            <button id="mobile-menu-button" class="md:hidden text-gray-700 focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </nav>
       
        <div id="mobile-menu" class="hidden md:hidden fixed inset-0 bg-white bg-opacity-95 z-40 flex flex-col items-center justify-center space-y-8 text-xl">
            <button id="close-mobile-menu" class="absolute top-6 right-6 text-gray-700 focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            <a href="#" class="text-indigo-600 font-medium" onclick="document.getElementById('mobile-menu').classList.add('hidden')">Dashboard</a>
            <a href="#postedjobs" class="text-gray-700 hover:text-indigo-600 font-medium transition duration-300" onclick="document.getElementById('mobile-menu').classList.add('hidden')">Posted Jobs</a>
            
            <button id="logout-button-mobile" class="px-6 py-3 bg-red-600 text-white font-semibold rounded-lg shadow-md hover:bg-red-700 transition duration-300 transform hover:scale-105 w-4/5 text-center">Logout</button>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 md:p-6">
        <h1 class="text-4xl font-extrabold text-gray-800 mb-8 text-center">Welcome, Recruiter!</h1>


        <section class="bg-white p-6 rounded-xl shadow-lg mb-8">
            <h2 class="text-2xl font-bold text-gray-700 mb-4">Post a New Job</h2>
            
            <div id="message-box" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
                <strong class="font-bold">Error!</strong>
                <span class="block sm:inline" id="message-text"></span>
                <span class="absolute top-0 bottom-0 right-0 px-4 py-3 cursor-pointer" onclick="document.getElementById('message-box').classList.add('hidden')">
                    <svg class="fill-current h-6 w-6 text-red-500" role="button" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><title>Close</title><path d="M14.348 14.849a1.2 1.2 0 0 1-1.697 0L10 11.819l-2.651 2.65a1.2 1.2 0 1 1-1.697-1.697L8.303 10l-2.651-2.651a1.2 1.2 0 1 1 1.697-1.697L10 8.183l2.651-2.651a1.2 1.2 0 1 1 1.697 1.697L11.697 10l2.651 2.651a1.2 1.2 0 0 1 0 1.697z"/></svg>
                </span>
            </div>
            <form id="post-job-form" class="space-y-4">
                <div>
                    <label for="job-title" class="block text-sm font-medium text-gray-700 mb-1">Job Title</label>
                    <input type="text" id="job-title" name="title" required
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm focus:outline-none">
                </div>
                <div>
                    <label for="company-name" class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                    <input type="text" id="company-name" name="company" required
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm focus:outline-none">
                </div>
                <div>
                    <label for="job-location" class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                    <input type="text" id="job-location" name="location" required
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm focus:outline-none">
                </div>
                <div>
                    <label for="job-category" class="block text-sm font-medium text-gray-700 mb-1">Category</label>
                    <select id="job-category" name="category" required
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm focus:outline-none bg-white">
                        <option value="">Select a Category</option>
                        <option value="Software Development">Software Development</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Design">Design</option>
                        <option value="Finance">Finance</option>
                        <option value="Human Resources">Human Resources</option>
                    </select>
                </div>
                <div>
                    <label for="job-description" class="block text-sm font-medium text-gray-700 mb-1">Job Description</label>
                    <textarea id="job-description" name="description" rows="5" required
                              class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm focus:outline-none"></textarea>
                </div>
                <button type="submit"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-lg font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-300 transform hover:scale-105">
                    Post Job
                </button>
            </form>
        </section>
         <br/>
         <br/>
       
        <section id="postedjobs" class="bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold text-gray-700 mb-4">Your Posted Jobs</h2>
            <div id="posted-jobs-container" class="grid grid-cols-1 gap-6">
             
                <div class="text-center text-gray-500 py-10" id="loading-posted-jobs">Loading your jobs...</div>
                <div class="text-center text-gray-500 py-10 hidden" id="no-posted-jobs">You haven't posted any jobs yet.</div>
            </div>
        </section>
    </main>


    <footer class="bg-gray-800 text-gray-300 py-8 px-6 md:px-10 mt-auto">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center text-center md:text-left">
            <div class="mb-4 md:mb-0">
                <h3 class="text-xl font-bold text-white mb-2">JobLink</h3>
                <p>&copy; 2025 All rights reserved.</p>
            </div>
            <div class="flex space-x-6">
                <a href="#" class="hover:text-white transition duration-300">Privacy Policy</a>
                <a href="#" class="hover:text-white transition duration-300">Terms of Service</a>
                <a href="#" class="hover:text-white transition duration-300">Contact Us</a>
            </div>
        </div>
    </footer>

    <script src="./recruiterjs.js"></script>
</body>
</html>
